services:
  openclaw:
    image: ollama/ollama:latest
    container_name: openclaw-kimi
    ports:
      - "11434:11434"          # Claw.html connects here
    volumes:
      - ollama-data:/root/.ollama
      - ./entrypoint.sh:/entrypoint.sh:ro
    command: sh /entrypoint.sh
    restart: unless-stopped
    # Optional GPU (uncomment if you have NVIDIA + nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-data:
