<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw.html • OpenClaw Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .chat-bubble-user { 
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border-bottom-right-radius: 4px;
        }
        .chat-bubble-assistant { 
            background: #1f2937;
            border-bottom-left-radius: 4px;
        }
        #chat-window::-webkit-scrollbar { display: none; }
        .typing { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-3xl w-full bg-zinc-900 rounded-3xl shadow-2xl overflow-hidden border border-zinc-800">
        
        <!-- Header -->
        <div class="px-8 py-6 border-b border-zinc-800 flex items-center justify-between bg-zinc-950">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl flex items-center justify-center text-2xl shadow-inner">🦾</div>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">Claw Chat</h1>
                    <p class="text-zinc-400 text-sm">OpenClaw • kimi-k2.5:cloud</p>
                </div>
            </div>
            <div onclick="toggleSettings()" class="flex items-center gap-x-2 cursor-pointer hover:bg-zinc-800 px-4 py-2 rounded-2xl transition-colors">
                <span class="text-emerald-400 text-xs font-mono">● LIVE</span>
                <span id="status" class="text-zinc-400 text-sm">ollama running</span>
            </div>
        </div>

        <!-- Chat Window -->
        <div id="chat-window" class="h-[520px] p-6 overflow-y-auto flex flex-col gap-6 bg-[radial-gradient(#27272a_1px,transparent_1px)] bg-[length:20px_20px]">
            <!-- Welcome injected by JS -->
        </div>

        <!-- Input Area -->
        <div class="p-6 border-t border-zinc-800 bg-zinc-950">
            <div class="flex gap-3">
                <input 
                    id="user-input"
                    type="text"
                    class="flex-1 bg-zinc-800 focus:bg-white focus:text-zinc-950 text-white placeholder:text-zinc-400 px-6 py-4 rounded-3xl outline-none transition-all text-base"
                    placeholder="Ask OpenClaw anything..."
                    autocomplete="off">
                <button 
                    onclick="sendMessage()"
                    class="bg-gradient-to-r from-blue-500 to-cyan-400 hover:from-blue-600 hover:to-cyan-500 w-12 h-12 rounded-3xl flex items-center justify-center transition-all active:scale-95 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.874L5.999 12zm0 0h7.07" />
                    </svg>
                </button>
            </div>
            <div class="flex justify-between text-[10px] text-zinc-500 mt-3 px-2">
                <div>Model: <span class="font-mono text-cyan-300">kimi-k2.5:cloud</span></div>
                <div class="flex items-center gap-1">
                    <span>API:</span>
                    <span id="api-display" onclick="editApiUrl()" class="font-mono cursor-pointer hover:text-cyan-300">http://localhost:11434</span>
                </div>
                <div class="text-emerald-400">Static • /docs • GitHub Pages Ready</div>
            </div>
        </div>
    </div>

    <script>
        let messages = []
        let ollamaBaseUrl = "http://localhost:11434"
        let currentModel = "kimi-k2.5:cloud"   // ← FIXED: real model name

        const chatWindow = document.getElementById('chat-window')
        const userInput = document.getElementById('user-input')

        function addMessage(role, content, isStreaming = false) {
            const wrapper = document.createElement('div')
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} group`

            const bubble = document.createElement('div')
            bubble.className = `max-w-[75%] px-6 py-4 rounded-3xl text-[15.5px] leading-relaxed ${
                role === 'user' 
                    ? 'chat-bubble-user text-white' 
                    : 'chat-bubble-assistant text-white'
            }`
            
            if (isStreaming) {
                bubble.id = 'streaming-bubble'
                bubble.innerHTML = `<span class="typing inline-block w-2 h-2 bg-white rounded-full animate-pulse"></span>`
            } else {
                bubble.textContent = content
            }

            wrapper.appendChild(bubble)
            chatWindow.appendChild(wrapper)
            chatWindow.scrollTop = chatWindow.scrollHeight
            return bubble
        }

        async function streamResponse(prompt) {
            const streamingBubble = document.getElementById('streaming-bubble')
            let fullContent = ''

            try {
                const res = await fetch(`${ollamaBaseUrl}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [...messages, { role: 'user', content: prompt }],
                        stream: true
                    })
                })

                if (!res.ok) throw new Error(`HTTP ${res.status}`)

                const reader = res.body.getReader()
                const decoder = new TextDecoder()

                while (true) {
                    const { done, value } = await reader.read()
                    if (done) break

                    const chunk = decoder.decode(value)
                    const lines = chunk.split('\n').filter(line => line.trim() !== '')

                    for (const line of lines) {
                        try {
                            const parsed = JSON.parse(line)
                            if (parsed.message?.content) {
                                fullContent += parsed.message.content
                                streamingBubble.textContent = fullContent
                                chatWindow.scrollTop = chatWindow.scrollHeight
                            }
                            if (parsed.done) break
                        } catch (e) {}
                    }
                }

                messages.push({ role: 'user', content: prompt })
                messages.push({ role: 'assistant', content: fullContent })
                return fullContent

            } catch (err) {
                console.error(err)
                streamingBubble.innerHTML = `<span class="text-red-400 text-sm">⚠️ Cannot reach Ollama at ${ollamaBaseUrl}<br>Is Ollama + OpenClaw running?</span>`
                streamingBubble.classList.add('!bg-red-950')
                return null
            }
        }

        async function sendMessage() {
            const prompt = userInput.value.trim()
            if (!prompt) return

            addMessage('user', prompt)
            userInput.value = ''

            addMessage('assistant', '', true)
            await streamResponse(prompt)
        }

        function showWelcome() {
            const welcomeHTML = `
                <div class="mx-auto max-w-md text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-3xl text-4xl mb-6 shadow-inner">🦾</div>
                    <h2 class="text-2xl font-semibold mb-2">Hail~!! OpenClaw is LIVE</h2>
                    <p class="text-zinc-400">Static HTML chat • GitHub Pages<br>Model: <span class="font-mono text-cyan-300">kimi-k2.5:cloud</span> powered by OpenClaw</p>
                    <div class="mt-8 text-xs text-zinc-500 flex items-center justify-center gap-2">
                        <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                        Connected to localhost:11434
                    </div>
                </div>`
            const wrapper = document.createElement('div')
            wrapper.innerHTML = welcomeHTML
            chatWindow.appendChild(wrapper.firstElementChild)
        }

        function toggleSettings() {
            const url = prompt('Ollama API base URL', ollamaBaseUrl)
            if (url !== null) {
                ollamaBaseUrl = url.trim() || 'http://localhost:11434'
                document.getElementById('api-display').textContent = ollamaBaseUrl
            }
        }

        function editApiUrl() {
            toggleSettings()
        }

        window.onload = function () {
            tailwind.config = { content: [] }
            showWelcome()
            
            userInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    e.preventDefault()
                    sendMessage()
                }
            })
            
            setTimeout(() => userInput.focus(), 300)
            
            console.log('%c✅ Claw.html updated + ready for OpenClaw!', 'color:#22d3ee; font-family:monospace; font-size:13px')
        }
    </script>
</body>
</html>
